<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PiWatch 摄像头</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="shell">
    <header>
      <div><h1>PiWatch</h1><p>树莓派局域网摄像头</p></div>
      <span id="health" class="badge offline">连接中</span>
    </header>

    <section class="grid overview">
      <article class="viewer">
        <img id="live-view" src="/api/v1/stream.mjpg" alt="CSI 摄像头实时画面">
        <canvas id="detection-overlay" aria-label="YOLO 检测框" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"></canvas>
        <div id="stream-error" class="stream-error" hidden>摄像头画面暂不可用</div>
        <div class="viewer-bar">
          <span><i class="live-dot"></i> 实时画面</span>
          <a class="icon-button dark" href="/api/v1/snapshot.jpg" target="_blank" title="打开当前画面">&#8599;</a>
        </div>
      </article>

      <aside class="panel status-panel">
        <div class="panel-heading"><h2>设备状态</h2><button id="refresh" class="icon-button" title="刷新">&#8635;</button></div>
        <dl id="status"></dl>
      </aside>
    </section>

    <section class="panel system-panel">
      <div class="panel-heading"><div><h2>树莓派运行状态</h2><p>每 3 秒自动更新</p></div><span id="uptime" class="muted"></span></div>
      <div class="metric-grid">
        <article class="metric">
          <div class="metric-head"><span>CPU 温度</span><strong id="cpu-temp">--</strong></div>
          <div class="meter"><i id="cpu-temp-bar"></i></div>
          <small id="cpu-temp-note">读取中</small>
        </article>
        <article class="metric">
          <div class="metric-head"><span>CPU 利用率</span><strong id="cpu-usage">--</strong></div>
          <div class="meter"><i id="cpu-usage-bar"></i></div>
          <small id="load-average">负载 --</small>
        </article>
        <article class="metric">
          <div class="metric-head"><span>内存</span><strong id="memory-usage">--</strong></div>
          <div class="meter"><i id="memory-usage-bar"></i></div>
          <small id="memory-detail">--</small>
        </article>
      </div>
    </section>

    <section class="panel settings-panel">
      <div class="panel-heading"><div><h2>摄像头设置</h2><p>保存后实时画面会自动重新连接</p></div></div>
      <form id="settings">
        <div class="form-grid camera-fields">
          <label>摄像头类型<select name="source_type"><option value="csi">CSI</option><option value="usb">USB</option></select></label>
          <label>设备<input name="device" value="csi:0"></label>
          <label>分辨率
            <select name="resolution">
              <option value="640x480">640 × 480</option>
              <option value="1280x720">1280 × 720</option>
              <option value="1920x1080">1920 × 1080</option>
            </select>
          </label>
          <label>帧率<input name="fps" type="number" min="1" max="30" value="15"></label>
          <label>YOLO 推理尺寸
            <select name="yolo_imgsz" title="仅影响目标检测速度，不改变预览分辨率">
              <option value="256">256（最快）</option>
              <option value="320">320（快速）</option>
              <option value="416" selected>416（均衡）</option>
              <option value="512">512（精细）</option>
              <option value="640">640（最精细）</option>
            </select>
          </label>
          <label>YOLO 推理帧率
            <input name="yolo_sample_fps" type="number" min="1" step="1" value="2">
          </label>
          <label class="toggle-field">
            <input name="yolo_unlimited" type="checkbox">
            <span>不限制推理帧率</span>
          </label>
        </div>

        <div class="class-section">
          <div class="class-heading">
            <div><h2>COCO 检测类别</h2><p>勾选需要检测并绘制目标框的类别。</p></div>
            <div class="compact-actions">
              <button type="button" class="secondary-button" id="select-common">人员与动物</button>
              <button type="button" class="secondary-button" id="select-all">全选</button>
              <button type="button" class="secondary-button" id="clear-all">清空</button>
            </div>
          </div>
          <div id="class-groups" class="class-groups"></div>
          <div class="selection-summary"><strong id="selected-count">0</strong> / 80 类已选择</div>
        </div>

        <div class="actions"><button type="submit">保存设置</button><span id="message"></span></div>
      </form>
    </section>

    <section class="panel secondary-info">
      <div><h2>目标检测</h2><p id="yolo-detail">YOLO26n + NCNN 正在加载</p></div>
      <span id="yolo-badge" class="badge neutral">加载中</span>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
